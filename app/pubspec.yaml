name: robot_controller_app
description: Engineered Arts robot control app — Flutter presentation layer.
version: 0.1.0
publish_to: "none"

resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc:
  equatable:
  get_it:
  injectable:
  auto_route:
  freezed_annotation:
  json_annotation:
  doso:
  connectivity_plus:
  flutter_local_notifications:
  url_launcher:
  video_player: ^2.9.1

  design_system:
  robot_service:

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test:
  mocktail:
  build_runner:
  freezed:
  json_serializable:
  injectable_generator:
  auto_route_generator:
  flutter_lints:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/ameca_icon.webp"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash_animation.gif
    - assets/splash_video.mp4
    - assets/video/splash.mp4
